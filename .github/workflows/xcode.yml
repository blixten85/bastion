name: Xcode-bygge (iOS + macOS + tvOS)

# Verifierar att App/ (iPhone/iPad/Mac) faktiskt kompilerar. Ingen signering
# eller enhetsinstallation här — det kräver ett Apple Developer-konto, se
# README "Kontointegration"/"Bygg appen (på en Mac)" för nästa steg dit.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  xcodegen-and-build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # macos-26-imagens standard-Xcode kan bytas ut under oss vid en framtida
      # runner-uppdatering — pinnar explicit till den version som är
      # verifierad fungera med den här koden.
      - name: Välj Xcode 26.4.1
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.4.1"

      - name: Visa Xcode-version
        run: xcodebuild -version

      - name: Installera XcodeGen
        run: brew install xcodegen

      - name: Generera Xcode-projekt
        run: cd App && xcodegen generate

      # MÅSTE köras FÖRE alla `xcodebuild build`-anrop, inte bara innan
      # tvOS-schemat byggs — Xcodes nya byggsystem beräknar paketgrafen för
      # ALLA targets i .xcodeproj:en (ComputePackagePrebuildTargetDependency-
      # Graph) oavsett vilket scheme som faktiskt byggs, så en saknad tvOS-SDK
      # bröt även iOS-bygget nedan ("Unable to resolve module dependency:
      # 'Sentry'", PR #191 — tvOS-targeten fanns i projektet, men
      # plattformen var inte nedladdad på runnern än).
      # `-downloadPlatform` misslyckas ibland transient på en färsk runner
      # med "Unable to connect to simulator" (CoreSimulator-daemonen inte
      # redo än) — hoppar över nedladdningen helt om tvOS-runtime redan
      # finns förinstallerad (vanligt på GitHub-imagens macOS-runners),
      # annars några återförsök med kort paus.
      - name: Ladda ner tvOS-simulatorplattform
        run: |
          # "unavailable"-markerade runtimes (t.ex. en ofullständig/trasig
          # tidigare nedladdning) matchar annars samma grep och gör att
          # steget hoppar över nedladdningen trots att ingen ANVÄNDBAR
          # tvOS-runtime faktiskt finns (cubic-fynd, PR #191).
          if xcrun simctl list runtimes available 2>/dev/null | grep -q "tvOS"; then
            echo "tvOS-runtime redan tillgänglig, hoppar över nedladdning."
            exit 0
          fi
          for attempt in 1 2 3; do
            if xcodebuild -downloadPlatform tvOS; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Försök $attempt misslyckades, väntar innan omförsök..."
              sleep 15
            fi
          done
          echo "Alla nedladdningsförsök misslyckades." >&2
          exit 1

      - name: Bygg iOS (simulator, osignerat)
        run: |
          xcodebuild build \
            -project App/Bastion.xcodeproj \
            -scheme Bastion \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Bygg macOS (osignerat)
        run: |
          xcodebuild build \
            -project App/Bastion.xcodeproj \
            -scheme Bastion-macOS \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Bygg tvOS (simulator, osignerat)
        run: |
          xcodebuild build \
            -project App/Bastion.xcodeproj \
            -scheme Bastion-tvOS \
            -destination 'generic/platform=tvOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  swiftpm-macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Välj Xcode 26.4.1
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.4.1"
      - name: swift build (SSHCore + bastion-cli)
        run: swift build
      - name: swift test (SSHCore)
        run: swift test
