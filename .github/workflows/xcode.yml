name: Xcode-bygge (iOS + macOS)

# Verifierar att App/ (iPhone/iPad/Mac) faktiskt kompilerar. Ingen signering
# eller enhetsinstallation här — det kräver ett Apple Developer-konto, se
# README "Kontointegration"/"Bygg appen (på en Mac)" för nästa steg dit.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  xcodegen-and-build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # macos-26-imagens standard-Xcode kan bytas ut under oss vid en framtida
      # runner-uppdatering (CodeRabbit-fynd på PR #46) — pinnar explicit till
      # den version som är verifierad fungera med den här koden.
      - name: Välj Xcode 26.4.1
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: "26.4.1"

      - name: Visa Xcode-version
        run: xcodebuild -version

      - name: Installera XcodeGen
        run: brew install xcodegen

      - name: Generera Xcode-projekt
        run: cd App && xcodegen generate

      - name: Bygg iOS (simulator, osignerat)
        run: |
          xcodebuild build \
            -project App/Bastion.xcodeproj \
            -scheme Bastion \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Bygg macOS (osignerat)
        run: |
          xcodebuild build \
            -project App/Bastion.xcodeproj \
            -scheme Bastion-macOS \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

  swiftpm-macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Välj Xcode 26.4.1
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: "26.4.1"
      - name: swift build (SSHCore + bastion-cli)
        run: swift build
      - name: swift test (SSHCore)
        run: swift test
