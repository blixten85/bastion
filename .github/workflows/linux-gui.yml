name: Linux-GUI-bygge

# Bygger LinuxApp/ (bastion-gui, SwiftCrossUI/GTK4) — eget paket, se
# LinuxApp/Package.swift och README "Bygg Linux-GUI:t" för varför det inte
# ligger i rot-paketet. Kräver en Swift-toolchain nyare än stabila 6.1.3
# (swiftlang/swift#80759 kraschar på swift-mutex), så vi hämtar en
# development-snapshot i stället för apt-paketet.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: linux-gui-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linuxapp-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Installera GTK4-dev
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libgtk-4-dev pkg-config

      - name: Läs senaste Swift dev-snapshot-metadata (ubuntu24.04 — matchar runnerns OS)
        id: meta
        run: |
          set -euo pipefail
          curl -fsSL https://download.swift.org/development/ubuntu2404/latest-build.yml -o latest-build.yml
          DIR=$(grep '^dir:' latest-build.yml | cut -d' ' -f2)
          FILE=$(grep '^download:' latest-build.yml | cut -d' ' -f2)
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Cacha toolchain (keyad på snapshot-id — samma snapshot laddas aldrig ner två gånger)
        id: cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: swift-toolchain
          key: swift-toolchain-ubuntu2404-${{ steps.meta.outputs.dir }}

      - name: Hämta + verifiera + extrahera Swift dev-snapshot
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          BASE="https://download.swift.org/development/ubuntu2404/${{ steps.meta.outputs.dir }}"
          FILE="${{ steps.meta.outputs.file }}"
          curl -fsSL -o "swift.tar.gz" "$BASE/$FILE"
          curl -fsSL -o "swift.tar.gz.sig" "$BASE/$FILE.sig"
          curl --compressed -fsSL https://www.swift.org/keys/all-keys.asc | gpg --import
          gpg --verify swift.tar.gz.sig swift.tar.gz
          mkdir -p swift-toolchain
          tar xzf swift.tar.gz -C swift-toolchain --strip-components=1

      - name: Lägg toolchain i PATH
        run: echo "$PWD/swift-toolchain/usr/bin" >> "$GITHUB_PATH"

      - name: Visa Swift-version
        run: swift --version

      - name: Bygg bastion-gui
        run: |
          cd LinuxApp
          swift build --product bastion-gui
