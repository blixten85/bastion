name: TestFlight-uppladdning

# Manuell knapp, INTE på varje push/PR — varje körning konsumerar ett
# byggnummer hos Apple och laddar upp en riktig build till TestFlight.
#
# Signering via `fastlane match` (readonly) — certifikat/profil skapades
# EN gång manuellt (2026-07-08, kräver en riktig Mac med inloggad GUI-
# session; `-allowProvisioningUpdates` visade sig aldrig lyckas skapa ett
# distributionscertifikat på en engångs-CI-runner, se App/fastlane/Fastfile)
# och ligger krypterat i det privata repot blixten85/bastion-certificates.
#
# Secrets som krävs (Settings -> Secrets and variables -> Actions):
#   APP_STORE_CONNECT_TEAM_ID       10-teckens Team ID (Membership-sidan)
#   APP_STORE_CONNECT_KEY_ID        Key ID från App Store Connect API-nyckeln
#   APP_STORE_CONNECT_ISSUER_ID     Issuer ID (samma sida)
#   APP_STORE_CONNECT_KEY_CONTENT   .p8-filens innehåll, base64-kodat
#                                   (base64 -i AuthKey_XXXXXXXXXX.p8 | pbcopy)
#   MATCH_PASSWORD                  Lösenfras som krypterar bastion-certificates
#   MATCH_DEPLOY_KEY                Privat SSH-nyckel, skrivbehörig deploy key
#                                   på blixten85/bastion-certificates
on:
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # Samma pin som xcode.yml — se den filen för varför.
      - name: Välj Xcode 26.4.1
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.4.1"

      - name: Installera XcodeGen
        run: brew install xcodegen

      - name: Generera Xcode-projekt
        run: cd App && xcodegen generate

      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
          working-directory: App

      # match klonar/pushar bastion-certificates över SSH — samma
      # deploy-key-mönster som filtered-movies redan använder för sin
      # PAT-baserade motsvarighet, fast SSH-nyckel-baserat här. Skriven
      # direkt till en tempfil (inte via ssh-agent-tredjepartsaction) för
      # att hålla beroendegrafen minimal, samma linje som resten av repot.
      - name: Sätt upp SSH-nyckel för bastion-certificates
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MATCH_DEPLOY_KEY }}" > ~/.ssh/match_deploy_key
          chmod 600 ~/.ssh/match_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: fastlane beta
        working-directory: App
        env:
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/match_deploy_key -o IdentitiesOnly=yes"
        run: bundle exec fastlane beta
