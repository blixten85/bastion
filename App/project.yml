# XcodeGen-spec → genererar Bastion.xcodeproj. Kör på Mac:
#   brew install xcodegen
#   cd App && xcodegen generate && open Bastion.xcodeproj
# Sätt sedan ditt signeringsteam i Xcode (Signing & Capabilities) innan arkivering.
name: Bastion
options:
  bundleIdPrefix: se.denied
  deploymentTarget:
    iOS: "17.0"       # ContentUnavailableView m.m.
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.0.0"
  # Kärnan (SSHCore) ligger i repo-roten en nivå upp.
  Bastion:
    path: ..

targets:
  Bastion:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.md"
          - "*.entitlements"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Bastion
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: se.denied.bastion
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: SwiftTerm
      - package: Bastion
        product: SSHCore

  Bastion-macOS:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.md"
          - "Info.plist"
          - "*.entitlements"
    info:
      path: Info-macOS.plist
      properties:
        # OAuth-redirect (se OAuthProviders.swift/Info.plist-kommentaren för iOS).
        CFBundleURLTypes:
          - CFBundleURLName: se.denied.bastion.oauth
            CFBundleURLSchemes: [se.denied.bastion]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: se.denied.bastion
        PRODUCT_NAME: Bastion
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # App Sandbox + utgående nätverk (SSH kräver klient-nätverk). XcodeGen
    # genererar entitlements-filen ur detta.
    entitlements:
      path: Bastion-macOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    dependencies:
      - package: SwiftTerm
      - package: Bastion
        product: SSHCore
