# XcodeGen-spec → genererar Bastion.xcodeproj. Kör på Mac:
#   brew install xcodegen
#   cd App && xcodegen generate && open Bastion.xcodeproj
# DEVELOPMENT_TEAM är redan satt nedan (S6ZR2VU68T) — automatisk signering
# fungerar direkt, både lokalt i Xcode och i testflight.yml-workflowet.
name: Bastion
options:
  bundleIdPrefix: se.denied
  deploymentTarget:
    iOS: "17.0"       # ContentUnavailableView m.m.
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"
  # Kärnan (SSHCore) ligger i repo-roten en nivå upp.
  Bastion:
    path: ..

targets:
  Bastion:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.md"
          - "*.entitlements"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Bastion
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: se.denied.bastion
        DEVELOPMENT_TEAM: S6ZR2VU68T
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      # Utan den här: automatisk signering försöker signera ÄVEN Release-
      # arkivet (App Store-export) med en "Apple Development"-identitet,
      # vilket kräver en registrerad testenhet på kontot — fjärde riktiga
      # testflight.yml-körningen (2026-07-07) misslyckades med
      # "Your team has no devices from which to generate a provisioning
      # profile" av exakt den anledningen. "Apple Distribution" kräver
      # inga registrerade enheter, rätt identitet för App
      # Store/TestFlight-arkiv.
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - package: SwiftTerm
      - package: Bastion
        product: SSHCore

  Bastion-macOS:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.md"
          - "Info.plist"
          - "*.entitlements"
    info:
      path: Info-macOS.plist
      properties:
        # OAuth-redirect (se OAuthProviders.swift/Info.plist-kommentaren för iOS).
        CFBundleURLTypes:
          - CFBundleURLName: se.denied.bastion.oauth
            CFBundleURLSchemes: [se.denied.bastion]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: se.denied.bastion
        DEVELOPMENT_TEAM: S6ZR2VU68T
        PRODUCT_NAME: Bastion
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      # Samma resonemang som Bastion (iOS)-targetet ovan — "Apple
      # Distribution" för Release, inte "Apple Development".
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    # App Sandbox + utgående nätverk (SSH kräver klient-nätverk). XcodeGen
    # genererar entitlements-filen ur detta.
    entitlements:
      path: Bastion-macOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    dependencies:
      - package: SwiftTerm
      - package: Bastion
        product: SSHCore
